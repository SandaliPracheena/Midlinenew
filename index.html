<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Midline Clothing</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo">Mid<span>line</span></div>

  <nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">About</a>
  </nav>

  <div class="cart-icon" id="cartIcon">
    🛒 Cart
    <span id="cartCount">0</span>
  </div>
</header>

<section class="hero">
  <div class="hero-text">
    <h1>Wear Your <span>Confidence</span></h1>
    <p>Modern fashion for modern people.</p>
    <button>Shop Now</button>
  </div>

  <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1000&auto=format&fit=crop">
</section>

<section class="products">

  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1000&auto=format&fit=crop">

    <h3>Oversized T-Shirt</h3>
    <p>LKR 4,500</p>

    <button class="buy-btn">Add to Cart</button>
  </div>

  <div class="product-card">
    <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1000&auto=format&fit=crop">

    <h3>Urban Jacket</h3>
    <p>LKR 8,900</p>

    <button class="buy-btn">Add to Cart</button>
  </div>

</section>

<div class="cart-sidebar" id="cartSidebar">
  <h2>Your Cart</h2>
  <div id="cartItems"></div>
  <h3 id="cartTotal">Total: LKR 0</h3>
</div>

<script src="script.js"></script>
</body>
</html>
